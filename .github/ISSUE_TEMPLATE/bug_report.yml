name: 🐛 Bug Report
description: Something isn't working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
      placeholder: The browser never opened even though the dev server started...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15.5 / Windows 11 / Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node -v`
      placeholder: v22.14.0
    validations:
      required: true
  - type: input
    id: dev-server
    attributes:
      label: Dev server
      placeholder: Vite 6, Next.js 15, CRA, ...
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser option used
      options:
        - chrome (default)
        - brave
        - edge
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Terminal output
      description: Paste the output of `incognito-dev` (rendered as code automatically)
      render: shell

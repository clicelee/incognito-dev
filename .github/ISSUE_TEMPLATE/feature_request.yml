name: ✨ Feature Request
description: Suggest an idea for incognito-dev
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      placeholder: I always have to ... manually, it would be nice if ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you imagine it working? (CLI flag, config, etc.)
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
